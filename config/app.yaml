version: '1'
repo_root: .
default_domain: edge-ai
web_ui:
  host: 127.0.0.1
  port: 5000
  auto_open_browser: false
audit:
  enabled: true
  log_queries: false
source_types:
- url
- text
- note
- pdf
- repo
- image
- video
- api
suggested_tags: []
digest:
  max_source_chars: 40000
  max_tokens: 4096
lint:
  stale_days: 90
  stuck_job_minutes: 4
  low_confidence_threshold: 0.35
ui:
  default_theme: light
  themes:
  - light
  - dark
  - hackers-green
models:
  available:
  - claude-opus-4-7
  - claude-sonnet-4-6
  - claude-haiku-4-5
  main: claude-sonnet-4-6
  secondary: claude-haiku-4-5
