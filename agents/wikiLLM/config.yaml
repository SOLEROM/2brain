name: wikiLLM
description: Builds and maintains the wiki root at domains/<d>/index.md. Reads every
  approved page in the domain plus the domain's schema.md, then asks the LLM to produce
  an informative landing page grouped by theme with [[wikilinks]] into the wiki. This
  is the curated entry point surfaced by the Wiki tab's "wiki" view.
schedule: manual
work_scope: all
domain: agents
model: claude-sonnet-4-6
max_tokens: 4096
max_pages: 80
max_body_chars: 400
max_context_chars: 60000
include_candidates: false
question: ''
